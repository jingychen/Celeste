backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"
site_url: https://celestegallery.netlify.app
publish_mode: simple

collections:
  # 1. 画廊作品（文件夹集合）
  - name: "gallery"
    label: "画廊作品"
    folder: "content/gallery"
    create: true
    delete: true
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "图片", name: "image", widget: "image", required: true }
      - { label: "描述", name: "description", widget: "text" }
      - { label: "分类", name: "category", widget: "select", options: ["油画", "水彩", "素描", "摄影"] }
      - { label: "日期", name: "date", widget: "datetime" }

  # 2. 页面内容（文件夹集合）
  - name: "pages"
    label: "页面内容"
    folder: "content/pages"
    create: true
    delete: true
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "路径", name: "slug", widget: "string" }
      - { label: "内容", name: "body", widget: "markdown" }

  # 3. 网站设置（文件集合）- 修复版
  - name: "settings"
    label: "网站设置"
    files:
      - name: "site"  # ← 添加了这个必需的 name 属性
        label: "基本信息"
        file: "content/settings/site.yml"
        fields:
          - { label: "网站标题", name: "site_title", widget: "string" }
          - { label: "描述", name: "site_description", widget: "text" }
          - { label: "Logo", name: "logo", widget: "image", required: false }
