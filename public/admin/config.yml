backend:
  name: git-gateway
  branch: main

# 媒体文件设置
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# 网站地址（用于预览）
site_url: https://celestegallery.netlify.app

# 发布模式：简单（直接保存）或编辑工作流（草稿-审核-发布）
publish_mode: simple

# 定义内容集合（对应你的需求）
collections:
  # 1. 画廊图片管理
  - name: "gallery"
    label: "画廊作品"
    folder: "content/gallery"
    create: true
    delete: true
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "图片", name: "image", widget: "image", required: true }
      - { label: "描述", name: "description", widget: "text", required: false }
      - { label: "分类", name: "category", widget: "select", options: ["油画", "水彩", "素描", "数字艺术"] }
      - { label: "创建日期", name: "date", widget: "datetime" }

  # 2. 文字内容页面（如关于页面、声明等）
  - name: "pages"
    label: "页面内容"
    folder: "content/pages"
    create: true
    delete: true
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "路径", name: "slug", widget: "string", hint: "例如: about, statement" }
      - { label: "内容", name: "body", widget: "markdown" }
      - { label: "排序", name: "order", widget: "number", required: false }

  # 3. 全局设置
  - name: "settings"
    label: "网站设置"
    files:
      - file: "content/settings/site.yml"
        label: "基本信息"
        fields:
          - { label: "网站标题", name: "site_title", widget: "string" }
          - { label: "描述", name: "site_description", widget: "text" }
          - { label: "Logo", name: "logo", widget: "image", required: false }
          - { label: "社交媒体链接", name: "social", widget: "list", fields: [
              { label: "平台", name: "platform", widget: "string" },
              { label: "链接", name: "url", widget: "string" }
            ]}
