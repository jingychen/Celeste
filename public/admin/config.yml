backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"
site_url: https://celestegallery.netlify.app
publish_mode: simple

collections:
  # ── 展览管理 ──────────────────────────────────────────────
  - name: "exhibitions_list"
    label: "展览列表"
    # 单文件集合：所有展览保存在一个 JSON 数组里
    files:
      - name: "all"
        label: "所有展览"
        file: "public/content/exhibitions.json"
        fields:
          - name: items
            label: 展览
            label_singular: 展览
            widget: list
            fields:
              - { label: "编号 (如 01)", name: "number", widget: "string" }
              - { label: "标题", name: "title", widget: "string" }
              - { label: "URL Slug (英文，无空格)", name: "slug", widget: "string" }
              - { label: "艺术家", name: "artist", widget: "string" }
              - { label: "日期", name: "date", widget: "string", hint: "如：Jun 12 — Aug 30, 2026" }
              - { label: "地点", name: "location", widget: "string" }
              - { label: "展览图片（横版）", name: "image", widget: "image" }
              - { label: "海报图片（竖版）", name: "poster", widget: "image" }
              - label: "描述段落"
                name: "description"
                widget: "list"
                field: { label: "段落", name: "paragraph", widget: "text" }
              - label: "详情"
                name: "details"
                widget: "object"
                fields:
                  - { label: "媒介", name: "medium", widget: "string" }
                  - { label: "作品数量", name: "works", widget: "string" }
                  - { label: "策展人", name: "curated", widget: "string" }

  # ── 艺术家管理 ────────────────────────────────────────────
  - name: "artists_list"
    label: "艺术家列表"
    files:
      - name: "all"
        label: "所有艺术家"
        file: "public/content/artists.json"
        fields:
          - name: items
            label: 艺术家
            label_singular: 艺术家
            widget: list
            fields:
              - { label: "姓名", name: "name", widget: "string" }
              - { label: "URL Slug (英文，无空格)", name: "slug", widget: "string" }
              - { label: "媒介", name: "medium", widget: "string" }
              - { label: "所在城市", name: "location", widget: "string", hint: "如：Berlin, DE" }
              - { label: "头像", name: "portrait", widget: "image" }
              - label: "简介段落"
                name: "bio"
                widget: "list"
                field: { label: "段落", name: "paragraph", widget: "text" }
              - label: "代表作品"
                name: "works"
                widget: "list"
                fields:
                  - { label: "作品标题", name: "title", widget: "string" }
                  - { label: "年份", name: "year", widget: "string" }
                  - { label: "作品图片", name: "image", widget: "image" }

  # ── 网站基本设置 ──────────────────────────────────────────
  - name: "settings"
    label: "网站设置"
    files:
      - name: "site"
        label: "基本信息"
        file: "public/content/settings.json"
        fields:
          - { label: "网站标题", name: "site_title", widget: "string" }
          - { label: "副标题描述", name: "site_description", widget: "text" }
          - { label: "Open Call 截止日期", name: "opencall_deadline", widget: "string" }
          - { label: "About 展览数量", name: "stat_exhibitions", widget: "string" }
          - { label: "About 艺术家数量", name: "stat_artists", widget: "string" }
          - { label: "About 国家数量", name: "stat_countries", widget: "string" }
